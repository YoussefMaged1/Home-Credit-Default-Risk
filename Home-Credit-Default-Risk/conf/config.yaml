hydra:
  run:
    dir: .
  job:
    chdir: false
defaults:
  - _self_

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  competition_name: "home-credit-default-risk"

training:
  random_seed: 42
  n_folds: 5

optuna:
  n_trials: 10
  direction: "maximize"

xgboost:
  static_params:
    n_estimators: 1000
    tree_method: "hist"
    device: "cuda"  
    random_state: 42
    early_stopping_rounds: 50
    eval_metric: "auc"
  
  search_space:
    learning_rate_min: 0.01
    learning_rate_max: 0.1
    max_depth_min: 4
    max_depth_max: 8
    min_child_weight_min: 1
    min_child_weight_max: 20
    subsample_min: 0.6
    subsample_max: 0.9
    colsample_bytree_min: 0.4
    colsample_bytree_max: 0.8
    scale_pos_weight_min: 8
    scale_pos_weight_max: 12

catboost:
  static_params:
    iterations: 2000
    task_type: "GPU"
    devices: "0" 
    eval_metric: "AUC"
    early_stopping_rounds: 50
    verbose: False
    random_state: 42
  
  search_space:
    learning_rate_min: 0.005
    learning_rate_max: 0.1
    depth_min: 4
    depth_max: 10
    l2_leaf_reg_min: 1.0
    l2_leaf_reg_max: 10.0
    random_strength_min: 0.1
    random_strength_max: 5.0
    bagging_temperature_min: 0.0
    bagging_temperature_max: 1.0
    border_count_min: 128
    border_count_max: 255
    scale_pos_weight_min: 1.0
    scale_pos_weight_max: 12.0

artifacts:
  model_path: "models/final_models_pipelines"
  report_path: "reports"
  logs_path: "logs"

threshold: 0.25